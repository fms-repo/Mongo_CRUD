events {
    worker_connections 1024;
}

http {
    # Rate limiting
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;
    limit_req_zone $binary_remote_addr zone=mongo_limit:10m rate=5r/s;

    # Logging
    access_log /var/log/nginx/access.log;
    error_log /var/log/nginx/error.log warn;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/xml text/javascript application/json application/javascript application/xml+rss;

    # MongoDB Direct Connection Info - mongodb.aivizion.com
    server {
        listen 80;
        server_name mongodb.aivizion.com;

        location / {
            # MongoDB runs on port 27017 and doesn't have an HTTP interface
            # Provide connection information instead
            return 200 "MongoDB Connection String:\nmongodb://admin:admin123@mongodb.aivizion.com:27017/mydb?authSource=admin\n\nNote: Port 27017 must be forwarded in your router for external access.\nFor security, it's recommended to use SSH tunneling or VPN instead.\n\nMongoDB Admin UI: https://mongoadmin.aivizion.com\n";
            add_header Content-Type text/plain;
        }
    }

    # MongoDB Admin UI - mongoadmin.aivizion.com
    server {
        listen 80;
        server_name mongoadmin.aivizion.com;

        # Rate limiting
        limit_req zone=mongo_limit burst=10 nodelay;

        # Security headers
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;

        location / {
            proxy_pass http://host.docker.internal:8081;
            proxy_http_version 1.1;
            
            # Headers
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            # WebSocket support
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            
            # Timeouts
            proxy_connect_timeout 60s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;
            
            # Buffer settings
            proxy_buffering off;
        }
    }

    # API subdomain - api.aivizion.com (for FastAPI when ready)
    server {
        listen 80;
        server_name api.aivizion.com;

        # Rate limiting
        limit_req zone=api_limit burst=20 nodelay;

        # Security headers
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;

        location / {
            # For now, return a placeholder message
            return 200 "API endpoint - FastAPI not configured yet\nComing soon...\n";
            add_header Content-Type text/plain;
        }
    }

    # Default server - handles localhost and IP access
    server {
        listen 80 default_server;
        server_name localhost _;

        location / {
            proxy_pass http://host.docker.internal:8081;
            proxy_http_version 1.1;
            
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}